name: Rescore districts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rescore:
    runs-on: ubuntu-latest
    env:
      GPT_TOKEN: ${{ secrets.GPT_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Re-score all districts via GPT
        run: python3 rescore_districts.py

      - name: Rebuild HTML
        run: python3 build_listings_html.py

      - name: Commit updated scores
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add score.py listings_poznan.html
          git diff --staged --quiet && echo "nothing to commit" && exit 0
          git commit -m "rescore: update district scores based on GPT evaluation"
          git push origin main

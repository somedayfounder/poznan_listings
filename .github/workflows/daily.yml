name: Daily listings

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TG_TOKEN: ${{ secrets.TG_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      GPT_TOKEN: ${{ secrets.GPT_TOKEN }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run notifier
        run: python3 notify_new_listings.py

      - name: Enrich noise data from Poznań GIS
        run: python3 enrich_noise.py

      - name: Extract features via GPT
        run: python3 extract_features.py

      - name: Build HTML
        run: python3 build_listings_html.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add listings_latest.csv seen_ids.json listings_poznan.html \
                  coords_cache.json routes_cache.json features_cache.json \
                  noise_cache.json drive_cache.json \
                  score.py rescore_results.json supermarkets_cache.json resident_scores.json || true
          git diff --staged --quiet && echo "nothing to commit" && exit 0
          git commit -m "update listings $(date +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push origin main


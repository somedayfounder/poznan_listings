name: Daily listings

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TG_TOKEN: ${{ secrets.TG_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      GPT_TOKEN: ${{ secrets.GPT_TOKEN }}
      OPENROUTE_KEY: ${{ secrets.OPENROUTE_KEY }}
      YA_TOKEN: ${{ secrets.YA_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape listings
        run: python3 scrape_listings.py

      - name: Geocode coordinates from descriptions
        run: python3 geocode_coords.py

      - name: Fetch drive distances
        run: python3 fetch_drive_distances.py

      - name: Enrich noise data from Poznań GIS
        run: python3 enrich_noise.py

      - name: Extract features via GPT
        run: python3 extract_features.py

      - name: Notify new listings via Telegram
        run: python3 notify_new_listings.py

      - name: Build HTML
        run: python3 build_listings_html.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add listings_latest.csv seen_ids.json listings_poznan.html \
                  coords_cache.json routes_cache.json features_cache.json \
                  noise_cache.json drive_cache.json coords_override.json \
                  score.py rescore_results.json supermarkets_cache.json resident_scores.json || true
          git diff --staged --quiet && echo "nothing to commit" && exit 0
          git commit -m "update listings $(date +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            echo "retry $i..."
            sleep 5
          done

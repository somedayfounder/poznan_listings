name: Enrich listings

on:
  push:
    paths:
      - listings_latest.csv

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch driving distances
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python fetch_drive_distances.py

      - name: Rebuild HTML
        run: python build_listings_html.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add drive_cache.json listings_poznan.html
          git diff --cached --quiet || git commit -m "Auto: enrich distances and rebuild HTML [skip ci]"
          git push
